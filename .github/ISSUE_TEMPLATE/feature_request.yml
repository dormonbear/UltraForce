name: Feature request
description: Suggest an improvement or new capability
title: "feat: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow is difficult today?
      placeholder: I often need to navigate to...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should UltraForce do?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workaround or different design you considered?
    validations:
      required: false
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Search
        - Navigation
        - Commands
        - Settings
        - Accessibility
        - Salesforce domain support
        - Performance
        - Documentation
        - Other
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add screenshots, examples, or links if useful. Remove private Salesforce data.
    validations:
      required: false
