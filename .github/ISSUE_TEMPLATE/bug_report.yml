name: Bug report
description: Report a reproducible problem in UltraForce for Salesforce
title: "fix: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve UltraForce. Do not include Salesforce credentials, session tokens,
        private org data, or screenshots that expose customer data.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: UltraForce does not open when I press Cmd+B on a Lightning record page.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide the smallest set of steps that reproduces the issue.
      placeholder: |
        1. Log in to a Salesforce sandbox
        2. Open an Account record
        3. Press Cmd+B
        4. Observe that...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead?
    validations:
      required: true
  - type: dropdown
    id: salesforce-domain
    attributes:
      label: Salesforce domain type
      options:
        - lightning.force.com
        - my.salesforce.com
        - visualforce.com or visual.force.com
        - force.com
        - Salesforce China domain
        - Other
    validations:
      required: false
  - type: input
    id: version
    attributes:
      label: UltraForce version
      placeholder: 0.3.2
    validations:
      required: false
  - type: input
    id: browser
    attributes:
      label: Browser and version
      placeholder: Chrome 126
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Console logs or screenshots
      description: Remove private Salesforce data before attaching anything.
      render: text
    validations:
      required: false
