name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.1.2)'
        required: true

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    env:
      CWS_PUBLISH: ${{ secrets.CWS_PUBLISH_ENABLED }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint
        continue-on-error: true

      - name: Type Check
        run: pnpm type-check

      - name: Unit Tests
        run: pnpm test:run

      - name: Build Extension
        run: pnpm build

      - name: Install Playwright Chromium
        run: pnpm exec playwright install chromium --with-deps

      # Gate the release on the packed extension actually working in a real
      # browser: content script executes without module errors and the
      # keyboard shortcut opens the modal. Catches broken bundles that unit
      # tests cannot see (e.g. externalized dependencies).
      - name: Smoke Test Extension
        run: xvfb-run --auto-servernum node scripts/smoke-test.mjs

      - name: Package Extension
        run: pnpm package

      - name: Identify Package
        id: pkg
        run: |
          ZIP=$(find build -name '*.zip' | head -1)
          echo "zip_path=$ZIP" >> "$GITHUB_OUTPUT"
          echo "zip_name=$(basename $ZIP)" >> "$GITHUB_OUTPUT"
          echo "Found package: $ZIP"

      - name: Extract Release Notes
        id: notes
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.tag }}"
            VERSION="${VERSION#v}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          node scripts/extract-release-notes.mjs "$VERSION" > /tmp/release-body.md
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: v${{ steps.notes.outputs.version }}
          body_path: /tmp/release-body.md
          files: ${{ steps.pkg.outputs.zip_path }}
          draft: false
          prerelease: false

      - name: Upload to Chrome Web Store
        if: env.CWS_PUBLISH == 'true'
        continue-on-error: true
        run: |
          echo '${{ secrets.CWS_SERVICE_ACCOUNT_KEY }}' > /tmp/cws-key.json
          node scripts/cws-publish.mjs upload \
            --zip "${{ steps.pkg.outputs.zip_path }}" \
            --extension-id "${{ secrets.CWS_EXTENSION_ID }}" \
            --key /tmp/cws-key.json

      - name: Publish to Chrome Web Store
        if: env.CWS_PUBLISH == 'true'
        continue-on-error: true
        run: |
          node scripts/cws-publish.mjs publish \
            --extension-id "${{ secrets.CWS_EXTENSION_ID }}" \
            --key /tmp/cws-key.json
          rm -f /tmp/cws-key.json
